name: rate-limiter-test

# Minimal services for the test suite. Brought up by `make test` and torn down
# (with volumes) afterward, so every CI run starts from an empty Redis/Postgres.
# Ports are exposed on the host so `pytest` can reach them without joining a
# Docker network — keeps `tests/unit/` runnable from the host shell directly.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "${TEST_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rate_limiter_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${TEST_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rate_limiter_test"]
      interval: 2s
      timeout: 2s
      retries: 10
