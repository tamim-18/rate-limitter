name: rate-limiter

services:
  redis:
    image: redis:7-alpine
    container_name: rate-limiter-redis
    networks: [rate-limiter-net]
    volumes: [redis-data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: rate-limiter-postgres
    networks: [rate-limiter-net]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rate_limiter}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes: [pg-data:/var/lib/postgresql/data]
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-rate_limiter}",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rate-limiter-rabbitmq
    networks: [rate-limiter-net]
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes: [rabbit-data:/var/lib/rabbitmq]
    ports:
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 40s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: rate-limiter-api
    networks: [rate-limiter-net]
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEFAULT_ALGORITHM: ${DEFAULT_ALGORITHM:-token_bucket}
      DEFAULT_RATE_LIMIT: ${DEFAULT_RATE_LIMIT:-100}
      DEFAULT_WINDOW_SECONDS: ${DEFAULT_WINDOW_SECONDS:-60}
    command:
      [
        "/app/.venv/bin/uvicorn",
        "rate_limiter.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
      ]
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./src:/app/src:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: rate-limiter-worker
    networks: [rate-limiter-net]
    env_file:
      - .env
    environment:
      PYTHONPATH: /app/src
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RABBITMQ_URL: ${RABBITMQ_URL}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command:
      ["/app/.venv/bin/arq", "rate_limiter.worker.settings.WorkerSettings"]
    volumes:
      - ./src:/app/src:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

networks:
  rate-limiter-net:
    name: rate-limiter-net

volumes:
  redis-data:
  pg-data:
  rabbit-data:
